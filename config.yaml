  #     - name: AssetRegistry
  #       address:
  #         - "0x93759d1Db2587FE353e010E8cF90a22377AE9E3b" 
  #     - name: Asset
  #       address:
  #         - "0x31c2823a3D9Bed91F5ae62F3F3D674A0Bf36b795"

unordered_multichain_mode: true
preload_handlers: true
address_format: lowercase